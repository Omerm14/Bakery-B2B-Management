# Edge Function auth overrides. All other functions default to
# verify_jwt = true (Supabase's default) and additionally check the
# caller's role inside the function body where relevant (e.g.
# provision-and-welcome-customer checks app_metadata.role === 'staff').

[functions.send-customer-otp]
verify_jwt = false

[functions.verify-customer-otp]
verify_jwt = false

# Triggered by pg_net from a Postgres function, not by a user session —
# authenticated via the x-cron-secret header instead (see the function
# source and migration 013).
[functions.send-weekly-reminders]
verify_jwt = false
